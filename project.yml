name: ClaudePulse
options:
  bundleIdPrefix: com.claudepulse
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: false
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClaudePulse:
    type: application
    platform: macOS
    sources:
      - ClaudePulse
      - Shared
    info:
      path: ClaudePulse/Info.plist
      properties:
        CFBundleDisplayName: Claude Pulse
        LSUIElement: true
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        SUFeedURL: https://github.com/psalkowski/claude-pulse/releases/latest/download/appcast.xml
        SUPublicEDKey: Z7YW103E1PPzc9j+ygwjyFEzpuIiMbtBJ0RRb8kymB4=
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudepulse.app
        PRODUCT_NAME: ClaudePulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ClaudePulseWidget
        embed: true
      - package: Sparkle
  ClaudePulseWidget:
    type: app-extension
    platform: macOS
    sources:
      - ClaudePulseWidget
      - Shared
    entitlements:
      path: ClaudePulseWidget/ClaudePulseWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.temporary-exception.files.home-relative-path.read-only:
          - /Library/Application Support/ClaudePulse/
    info:
      path: ClaudePulseWidget/Info.plist
      properties:
        CFBundleDisplayName: Claude Pulse Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudepulse.app.widget
