<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f4"/>
      <stop offset="1" stop-color="#efe8de"/>
    </linearGradient>
    <mask id="spark">
      <rect x="0" y="0" width="100" height="100" fill="#fff"/>
      <path d="M50 31 C52.4 46.5 53.5 47.6 69 50 C53.5 52.4 52.4 53.5 50 69 C47.6 53.5 46.5 52.4 31 50 C46.5 47.6 47.6 46.5 50 31 Z" fill="#000"/>
    </mask>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>

  <g transform="translate(640 240) scale(2.55) translate(-50 -50)">
    <circle cx="50" cy="50" r="25" fill="#D97757" mask="url(#spark)"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(217,119,87,.22)" stroke-width="7"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#D97757" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="170 239" transform="rotate(-90 50 50)"/>
  </g>

  <text x="640" y="450" text-anchor="middle"
        font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="78" font-weight="700" fill="#2b2622">Claude Pulse</text>
  <text x="640" y="500" text-anchor="middle"
        font-family="SF Pro Text, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="29" font-weight="400" fill="#7a6f64">Claude Code usage limits in your menubar + widget</text>
</svg>
